syntax = "proto3";

package logger.proto;

option optimize_for = SPEED;

message LogRecord {
  uint32 level       = 1;  // LogLevel enum value
  int64  time_ns     = 2;  // nanoseconds since system_clock epoch
  string logger_name = 3;
  string file        = 4;
  uint32 line        = 5;
  string func        = 6;
  string message     = 7;
  uint64 pid         = 8;
  uint64 tid         = 9;
}
